name: Daily Node Job

on:
  schedule:
    - cron: "10 11 * * *"   # runs once every day at midnight UTC
  workflow_dispatch:      # optional manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run script
        run: node index.js